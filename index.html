<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Engineering App - Formulario</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main>
        <h1>Panel de Control de Tareas</h1>
        <p>Bienvenido a la aplicación de gestión para Ingeniería en Desarrollo de Software.</p>

        <section class="task-form-container">
            <h2>Agregar Nueva Tarea</h2>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Título de la tarea:</label>
                    <input type="text" id="task-title" placeholder="Ej. Crear base de datos" required>
                </div>
                <div class="form-group">
                    <label for="task-desc">Descripción:</label>
                    <textarea id="task-desc" placeholder="Detalles de la actividad..."></textarea>
                </div>
                <button type="submit">Guardar Tarea</button>
            </form>
        </section>
        
    </main>

    <script src="js/app.js"></script>
</body>
</html>
